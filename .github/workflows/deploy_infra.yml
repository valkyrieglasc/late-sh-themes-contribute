name: deploy_infra

on:
  release:
    types: [published]

concurrency:
  group: ${{ endsWith(github.ref, '-infra') && format('terraform-deploy-{0}', github.event.release.prerelease && 'staging' || 'production') || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  get_images:
    name: get_current_image_tags
    if: endsWith(github.ref, '-infra')
    runs-on: ubuntu-latest
    environment: ${{ github.event.release.prerelease == true && 'staging' || 'production' }}
    outputs:
      ssh_image_tag: ${{ steps.ssh_image.outputs.image_tag }}
      web_image_tag: ${{ steps.web_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_ssh_image_tag
        id: ssh_image
        run: |
          tag=$(kubectl get deployment service-ssh -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: get_web_image_tag
        id: web_image
        run: |
          tag=$(kubectl get deployment service-web -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  terraform:
    name: terraform_apply
    if: endsWith(github.ref, '-infra')
    needs: get_images
    uses: ./.github/workflows/terraform.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      ssh_image_tag: ${{ needs.get_images.outputs.ssh_image_tag }}
      web_image_tag: ${{ needs.get_images.outputs.web_image_tag }}
      environment: ${{ github.event.release.prerelease == true && 'staging' || 'production' }}

  sync_music:
    name: sync_music_from_r2
    if: endsWith(github.ref, '-infra')
    needs: terraform
    runs-on: ubuntu-latest
    environment: ${{ github.event.release.prerelease == true && 'staging' || 'production' }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: sync_music_from_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          MUSIC_BUCKET: ${{ vars.MUSIC_BUCKET }}
        run: |
          aws s3 sync "s3://${MUSIC_BUCKET}/" ./music/ \
            --endpoint-url "${S3_ENDPOINT}"

          POD=$(kubectl get pod -l app=liquidsoap -o jsonpath='{.items[0].metadata.name}')
          for genre in music/*/; do
            genre_name=$(basename "${genre}")
            kubectl exec "${POD}" -- mkdir -p "/music/${genre_name}"
            kubectl exec "${POD}" -- find "/music/${genre_name}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            kubectl cp "${genre}/." "${POD}:/music/${genre_name}/"
          done

      - name: verify_music_sync
        run: |
          POD=$(kubectl get pod -l app=liquidsoap -o jsonpath='{.items[0].metadata.name}')
          echo "Music files on pod:"
          kubectl exec "${POD}" -- find /music -name "*.mp3" | wc -l
          kubectl exec "${POD}" -- du -sh /music/
